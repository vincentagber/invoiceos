services:
  - type: web
    name: invoiceos-api
    env: node
    plan: standard
    region: oregon
    
    # Build configuration
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    
    # Health check
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
    # Environment variables reference
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: LOG_LEVEL
        value: info
    
    # Disk storage for logs (optional)
    disk:
      name: invoice_logs
      mountPath: /var/data
      sizeGB: 5

    # Auto-deploy from main branch
    autoDeploy: true
    branch: main
    
    # Set scaling limits
    plan: standard
    maxInstances: 3
    minInstances: 1
